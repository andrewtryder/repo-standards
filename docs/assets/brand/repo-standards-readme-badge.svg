<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500" role="img" aria-labelledby="title desc">
  <title id="title">Repo Standards README badge</title>
  <desc id="desc">A rounded dark badge featuring the Repo Standards icon and wordmark for README usage on light or dark backgrounds.</desc>
  <defs>
    <linearGradient id="badgeBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c2a3d"/>
      <stop offset="100%" stop-color="#22344a"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1d35"/>
      <stop offset="100%" stop-color="#0c1628"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#1fb6ff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#19e66e"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#08101c" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="20" y="28" width="1560" height="444" rx="120" fill="url(#badgeBg)" stroke="#455c77" stroke-width="8" filter="url(#shadow)"/>
  <rect x="110" y="112" width="250" height="250" rx="48" fill="url(#iconBg)" stroke="#2b466d" stroke-width="6"/>
  <path d="M178 181 L145 237 L178 293" stroke="url(#blue)" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M292 181 L325 237 L292 293" stroke="url(#blue)" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M204 237 L235 268 L287 188" stroke="url(#green)" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="328" cy="128" r="42" fill="url(#green)" stroke="#173f2b" stroke-width="6"/>
  <path d="M310 128 L323 143 L347 107" stroke="#ffffff" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="435" y="195" fill="#d2d8de" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="86" font-weight="500">repo</text>
  <text x="435" y="340" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="190" font-weight="800">standards</text>
</svg>
