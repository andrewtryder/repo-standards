site_name: Repo Standards
site_description: Reusable GitHub repository standards for CI/CD, governance, AI rules, and migration.
site_url: https://andrewtryder.github.io/repo-standards/
repo_url: https://github.com/andrewtryder/repo-standards
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  logo: assets/brand/repo-standards-icon.svg
  favicon: assets/brand/repo-standards-icon.svg
  features:
    - navigation.expand
    - navigation.sections
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting started:
      - Wizard-first adoption: getting-started/wizard.md
      - Existing repository migration: existing-repository-migration.md
      - New repository setup: new-repository-setup.md
      - Migration order: migration-order.md
      - CLI usage: using-repo-standards.md
  - Core model:
      - Core concepts: concepts.md
      - Modular standards: core/modular-standards.md
      - AI-agent standardization: core/ai-agent-standardization.md
      - Governance model: core/governance-model.md
      - License selection: core/license-selection.md
      - Profiles: profiles.md
      - Detection: detection.md
  - Roadmap and versioning:
      - Roadmap: roadmap.md
      - Versioning: versioning.md
      - Documentation overhaul plan: docs-overhaul-plan.md
  - Migration tools:
      - Assessment guide: assessment-guide.md
      - GitHub Models migration: github-models-migration.md
      - GitHub Models detection: github-models-detection.md
  - Specification and automation:
      - Standard reference: repo-standard-v1.md
      - Code quality standards: code-quality-standards.md
      - Branch protection: branch-protection.md
      - Template drift: template-drift.md
      - Reusable workflows: reusable-workflows.md
      - Release process: release-process.md
      - Publishing: publishing.md
  - AI and governance:
      - AI rules maintenance: ai-rules-maintenance.md
      - CODEOWNERS: codeowners.md
  - Security and dependencies:
      - Security scanning: security-scanning.md
      - License scanning: license-scanning.md
      - Dependency updates: dependency-updates.md
  - Deployment:
      - Cloudflare: deployment/cloudflare.md
      - GCP: deployment/gcp.md
      - Railway: deployment/railway.md
  - Tooling:
      - Dev container: devcontainer.md
