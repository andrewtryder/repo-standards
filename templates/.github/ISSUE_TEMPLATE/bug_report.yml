name: Bug report
description: Report a bug to help us improve
title: '[BUG] '
labels: bug
assignees: ''
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us reproduce and fix the issue.

        **Before submitting:**
        - Search existing issues to avoid duplicates
        - Check if the issue is already reported
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of what the bug is
      placeholder: Briefly describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen
      placeholder: Describe what should happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened
      placeholder: Describe what happened instead
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: What environment are you using?
      options:
        - Browser (name and version)
        - Node.js (version)
        - Python (version)
        - Cloudflare Workers
        - Other (please specify)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and errors
      description: Please provide any relevant logs, error messages, or stack traces
      placeholder: |
        ```text
        [paste logs here]
        ```
      render: shell
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any additional information that might be helpful
      placeholder: Screenshots, videos, or other context