name: Feature request
description: Suggest an idea for improving this project
title: '[FEATURE] '
labels: enhancement
assignees: ''
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the information below to help us understand your request.

        **Before submitting:**
        - Search existing issues to avoid duplicates
        - Check if the feature is already requested
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: Describe the problem you're trying to solve
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe your proposed solution
      placeholder: How would you implement this feature?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or features you've considered
      placeholder: What other approaches have you tried?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: How would this feature impact users or the project?
      placeholder: Who would benefit from this feature?
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any additional information that might be helpful
      placeholder: Screenshots, mockups, or other context