name: example-typescript-library
profile: typescript-library
visibility: public
license: MIT
governance:
  contributing: required
  pull_request_template: required
package_manager: npm
node_version: "24"
dependency_standards:
  runtime: dependencies
  development: devDependencies
  repo_tooling: devDependencies
  policy: keep tooling packages out of runtime dependencies

commands:
  install: npm ci
  format_check: npm run format:check --if-present
  lint: npm run lint --if-present
  typecheck: npm run typecheck --if-present
  test: npm test --if-present
  coverage: npm run test:coverage --if-present
  build: npm run build --if-present

quality_gates:
  semantic_pr_title: required
  ai_rules_sync: required
  coverage: report-only
  docs: required

release:
  release_please: true
  strategy: node
  production_branch: main

deploy:
  provider: npm
  workflow: repo-specific

migration_notes: >
  Replace node_version with the version used in your repo.
  The operational source of truth for Node version is `.nvmrc` (root-level file).
  `node_version` in this file is descriptive; `.nvmrc` drives CI and local setup.
  Coverage default is report-only; add --if-present or a script check as needed.
  Release Please uses the Node strategy for package.json version bumps.
