name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          if [ -f requirements_test.txt ]; then python -m pip install -r requirements_test.txt; fi
          python -m pip install ruff pytest coverage

      - name: Format check
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      # Python typechecking (mypy, pyright, etc.) is adopted repo-by-repo.
      # Add a "Typecheck" step here when the repo adds a typecheck command.

      - name: Test + coverage
        run: |
          coverage run -m pytest
          coverage report
        # Coverage is report-only by default. Repos can add --fail-under=<threshold>
        # in their .repo-policy.yml or override this step when ready for strict gates.